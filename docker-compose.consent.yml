# Override used ONLY during the one-time Google OAuth consent flow.
#
# Normal operation (docker-compose.yml alone) keeps calendar-mcp purely on the
# internal Docker network — zero inbound ports. Safe, but it prevents the
# browser from reaching the OAuth landing UI at http://calendar-mcp:3000/.
#
# In nspady's HTTP mode, port 3000 handles EVERYTHING for the OAuth flow:
#   GET /                  → account-management UI
#   POST /api/accounts     → returns Google OAuth URL
#   GET /oauth2callback    → catches Google's code redirect
#
# Ports 3500-3505 are NOT used in HTTP mode (they're stdio / CLI only), so
# we only publish 3000 here — bound to 127.0.0.1 so the OAuth endpoint
# isn't exposed to the open internet. Access from laptop is via SSH tunnel:
#   ssh -N -L 3000:localhost:3000 yunam
# Then open http://localhost:3000/ in the laptop browser.
#
# After the token lands in `calendar-tokens`, stop this override and
# restart normally:
#   docker compose --profile gcal down
#   docker compose --profile gcal up -d --build

services:
  calendar-mcp:
    ports:
      - "127.0.0.1:3000:3000"
