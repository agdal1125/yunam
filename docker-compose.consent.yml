# Override used ONLY during the one-time Google OAuth consent flow.
#
# WHY network_mode: host + HOST=localhost:
# nspady builds the OAuth redirect URI from the HOST env var literally:
#   http://${HOST}:${PORT}/oauth2callback
# For runtime we use HOST=0.0.0.0 so yunam-gateway can reach calendar-mcp
# via the docker network. But Google OAuth REJECTS `0.0.0.0` as a redirect
# URI host (Desktop-app policy: only `localhost` and `127.0.0.1` allowed).
#
# Using `network_mode: host` during consent sidesteps the conflict:
#   - Container binds directly to VPS host's network stack, so HOST=localhost
#     makes nspady listen on VPS localhost (not the docker bridge).
#   - SSH tunnel (`ssh -L 3000:localhost:3000 yunam`) reaches VPS localhost
#     straight, no NAT, no port-publishing needed.
#   - Redirect URI becomes `http://localhost:3000/oauth2callback` — Google accepts.
#
# After consent saves the token into the `calendar-tokens` volume, stop this
# override and switch back to the bridge-network runtime mode:
#   docker compose --profile gcal down
#   docker compose --profile gcal up -d --build

services:
  calendar-mcp:
    network_mode: host
    environment:
      # IPv4 loopback specifically — node treats `localhost` as ::1 only on
      # this host, which fails any SSH `-L 3000:localhost:3000` tunnel
      # (OpenSSH resolves the remote `localhost` via its hostname resolver
      # and tries 127.0.0.1 first). Binding to 127.0.0.1 keeps the consent
      # endpoint host-local AND makes the standard tunnel form work.
      # Google OAuth Desktop-app policy accepts 127.0.0.1 as a redirect
      # host the same as `localhost`.
      - HOST=127.0.0.1
    # Port publishing is irrelevant under host networking — the container IS
    # the host from a networking standpoint. Explicitly clear the base
    # compose's expose/port settings just for clarity.
    ports: !reset []
    healthcheck: !reset null
